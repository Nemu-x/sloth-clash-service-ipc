name: Service Integration

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  service-flow:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Build binaries
        run: cargo build --release --features "standalone client test"

      # The hardened service (>= 2.3.0) only spawns a core that either matches a
      # pinned SHA-256 or lives in an admin-only directory. The mock binary sits
      # in target/release (user-writable), so the test must pin it — exactly what
      # the desktop app does at install time. Without this the service correctly
      # refuses to start the mock and the run fails.
      - name: Install service (Linux)
        if: runner.os == 'Linux'
        run: |
          CORE_SHA=$(sha256sum target/release/mock_binary | cut -d' ' -f1)
          sudo target/release/sloth-clash-service-install --debug --core-sha256 "$CORE_SHA"

      - name: Verify service (Linux)
        if: runner.os == 'Linux'
        run: sudo systemctl is-active sloth-clash-service.service

      - name: Run mock_binary (Linux)
        if: runner.os == 'Linux'
        run: |
          target/release/service-integration-driver start
          sleep 2
          pgrep -f mock_binary

      - name: Stop mock_binary (Linux)
        if: runner.os == 'Linux'
        run: target/release/service-integration-driver stop

      - name: Uninstall service (Linux)
        if: runner.os == 'Linux'
        run: sudo target/release/sloth-clash-service-uninstall --debug

      - name: Install service (macOS)
        if: runner.os == 'macOS'
        run: |
          CORE_SHA=$(shasum -a 256 target/release/mock_binary | cut -d' ' -f1)
          sudo target/release/sloth-clash-service-install --debug --core-sha256 "$CORE_SHA"

      - name: Verify service (macOS)
        if: runner.os == 'macOS'
        run: sudo launchctl list | grep dev.slothclash.desktop.ipc.service

      - name: Run mock_binary (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo target/release/service-integration-driver start
          sleep 2
          # pgrep -f mock_binary

      - name: Stop mock_binary (macOS)
        if: runner.os == 'macOS'
        run: sudo target/release/service-integration-driver stop

      - name: Uninstall service (macOS)
        if: runner.os == 'macOS'
        run: sudo target/release/sloth-clash-service-uninstall --debug

      - name: Install service (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sha = (Get-FileHash "$env:GITHUB_WORKSPACE\\target\\release\\mock_binary.exe" -Algorithm SHA256).Hash.ToLower()
          & "$env:GITHUB_WORKSPACE\\target\\release\\sloth-clash-service-install.exe" --core-sha256 $sha
          Start-Sleep -Seconds 2

      - name: Verify service (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $state = sc query sloth_clash_service | Select-String "STATE"
          if ($state -notmatch "RUNNING") { exit 1 }

      - name: Run mock_binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process "$env:GITHUB_WORKSPACE\\target\\release\\service-integration-driver.exe" -ArgumentList "start" -Wait
          Start-Sleep -Seconds 2
          Get-Process -Name mock_binary

      - name: Stop mock_binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process "$env:GITHUB_WORKSPACE\\target\\release\\service-integration-driver.exe" -ArgumentList "stop" -Wait

      - name: Uninstall service (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\\target\\release\\sloth-clash-service-uninstall.exe"
